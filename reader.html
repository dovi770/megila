<script>
    let displayMode = 0; let scrollMode = 0;
    let currentFontSize = window.innerWidth < 768 ? 1.7 : 2.5; 
    let currentChapter = 1; let currentPlaybackRate = 1; let currentSpeedIdx = 0;
    const playSpeeds =[1, 1.25, 1.5, 1.75, 2, 2.5, 3];
    const audio = document.getElementById('megillahAudio');

    // === הגדרות מערכת הרעשן הווירטואלי ===
    const graggerAudio = new Audio('gragger.mp3'); 
    graggerAudio.preload = 'auto'; 
    graggerAudio.loop = true; 

    let isGraggerAllowed = false; 
    let activeGraggersOnScreen = 0;
    let sensorsInitialized = false;
    let lastAccX = null, lastAccY = null, lastAccZ = null;
    let shakeStopTimeout = null; 

    // === משתנים לחישוב התקדמות קריאה (פס חזותי בלבד) ===
    let chapWordCounts = {};
    let totalMegillahWords = 0;
    let scrollTimeout = null;

    // ספירת כל המילים במגילה בטעינה ראשונית (מאחורי הקלעים)
    function initWordCounts() {
        if (typeof megillahData === 'undefined') return;
        totalMegillahWords = 0;
        for (let c = 1; c <= 10; c++) {
            chapWordCounts[c] = { pesukim:[], total: 0 };
            let currentChapWords = 0;
            if (!megillahData[c]) continue;
            megillahData[c].forEach(p => {
                // נספור מילים תוך התעלמות מתווי ה-@ ו-& עבור חישוב ההתקדמות בלבד
                let cleanText = p.t.replace(/^(\([\u05D0-\u05EA]{1,3}\))/, '').replace(/@/g, ' ').replace(/&/g, ' ');
                let wordsCount = cleanText.trim().split(/\s+/).length;
                chapWordCounts[c].pesukim.push(wordsCount);
                currentChapWords += wordsCount;
            });
            chapWordCounts[c].total = currentChapWords;
            totalMegillahWords += currentChapWords;
        }
    }

    function getActivePasukIndex() {
        let pesukim = document.querySelectorAll('.pasuk');
        if (pesukim.length === 0) return 0;
        
        // נחפש את האלמנט עם הקלאס 'playing-now' וננסה למצוא את ה-dataset.index שלו.
        const playingPasuk = document.querySelector('.pasuk.playing-now');
        if (playingPasuk) {
            return parseInt(playingPasuk.dataset.index) || 0;
        }

        // אם אין פסוק מודגש, נחפש את הפסוק שהתחיל הקריאה לאחרונה על סמך זמן השמע.
        const data = megillahData[currentChapter] || [];
        let activeIdx = 0;
        for (let i = 0; i < data.length; i++) {
            if (audio.currentTime >= data[i].time) {
                activeIdx = i;
            } else {
                break; // אם עברנו את הזמן, אין צורך להמשיך לחפש
            }
        }
        return activeIdx;
    }

    // מחשב כמה מילים נקראו במצטבר מתחילת פרק א'
    function getCurrentWordsRead(activeIdx) {
        let read = 0;
        for (let c = 1; c < currentChapter; c++) {
            if (chapWordCounts[c]) read += chapWordCounts[c].total;
        }
        if (chapWordCounts[currentChapter]) {
            for (let i = 0; i <= activeIdx; i++) {
                if (chapWordCounts[currentChapter].pesukim[i]) {
                    read += chapWordCounts[currentChapter].pesukim[i];
                }
            }
        }
        return read;
    }

    // מעדכן אך ורק את אורך הפס העיצובי
    function updateProgress() {
        if (totalMegillahWords === 0) return;
        
        let activeIdx = getActivePasukIndex();
        let currentWords = getCurrentWordsRead(activeIdx);
        let percent = (currentWords / totalMegillahWords) * 100;
        
        // מוודא שהאחוזים לא עפים מעל 100
        percent = Math.min(100, Math.max(0, percent));
        
        document.getElementById('progressBarFill').style.width = percent + '%';
    }

    // מאזין לגלילה כדי לקדם את הפס בצורה חלקה
    window.addEventListener('scroll', () => {
        if (!scrollTimeout) {
            scrollTimeout = setTimeout(() => {
                updateProgress();
                scrollTimeout = null;
            }, 100); 
        }
    });

    // --- לוגיקה חדשה: טיפול בסיום פרק אוטומטית ---
    function handleChapterEnd() {
        if (scrollMode === 1 && currentChapter < 10) { // אם הגלילה אוטומטית וזה לא הפרק האחרון
            loadChapter(currentChapter + 1); // טען את הפרק הבא
            audio.play(); // והתחל לנגן אותו אוטומטית
        } else if (currentChapter === 10) {
            audio.pause(); // סיים את הניגון אם זה הפרק האחרון
            // אולי תרצה להוסיף כאן הודעה שהמגילה הסתיימה
        }
    }
    // קשר את הפונקציה לאירוע onended של האודיו
    audio.onended = handleChapterEnd;
    // --- סוף לוגיקה חדשה ---


    function initSensorsOnFirstTouch() {
        if (sensorsInitialized) return;
        
        graggerAudio.volume = 0;
        graggerAudio.play().catch(() => {});

        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission().then(permissionState => {
                if (permissionState === 'granted') {
                    window.addEventListener('devicemotion', handleMotion);
                }
            }).catch(console.error);
        } else {
            window.addEventListener('devicemotion', handleMotion);
        }

        sensorsInitialized = true;
        document.removeEventListener('click', initSensorsOnFirstTouch);
        document.removeEventListener('touchstart', initSensorsOnFirstTouch);
    }

    document.addEventListener('click', initSensorsOnFirstTouch);
    document.addEventListener('touchstart', initSensorsOnFirstTouch);

    const graggerObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                if (!entry.target.classList.contains('active')) {
                    entry.target.classList.add('active'); 
                    activeGraggersOnScreen++;
                    
                    if (activeGraggersOnScreen === 1) { 
                        isGraggerAllowed = true;
                        showToast("נער את הטלפון כדי להרעיש 🪇", 3500);
                        if (graggerAudio.paused) {
                            graggerAudio.volume = 0;
                            graggerAudio.play().catch(() => {});
                        }
                    }
                }
            } else {
                if (entry.target.classList.contains('active')) {
                    entry.target.classList.remove('active'); 
                    activeGraggersOnScreen = Math.max(0, activeGraggersOnScreen - 1);
                    
                    if (activeGraggersOnScreen === 0) { 
                        isGraggerAllowed = false;
                        stopGraggerEffect(); 
                        hideToast();
                    }
                }
            }
        });
    }, { threshold: 0.1 }); 

    function insertGraggers(text) {
        const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect x="20" y="10" width="24" height="24" fill="#D2691E" stroke="#8B4513" stroke-width="2"/><rect x="29" y="34" width="6" height="26" fill="#8B4513"/><circle cx="32" cy="22" r="4" fill="#FFD700"/></svg>`;
        const graggerHtml = `<span class="gragger-icon">${svgIcon}</span>`;
        return text.replace(/###/g, graggerHtml);
    }

    function handleMotion(event) {
        let acc = event.accelerationIncludingGravity;
        if (!acc) return;

        if (lastAccX !== null) {
            let deltaX = Math.abs(acc.x - lastAccX);
            let deltaY = Math.abs(acc.y - lastAccY);
            let deltaZ = Math.abs(acc.z - lastAccZ);

            if (isGraggerAllowed && (deltaX + deltaY + deltaZ > 12)) {
                startGraggerEffect();
            }
        }
        lastAccX = acc.x; lastAccY = acc.y; lastAccZ = acc.z;
    }

    function startGraggerEffect() {
        graggerAudio.volume = 1;
        if (graggerAudio.paused) graggerAudio.play().catch(()=>{});

        const bigOverlay = document.getElementById('bigGraggerOverlay');
        const bigIcon = bigOverlay.querySelector('.big-gragger-icon');
        
        if (bigOverlay && bigIcon) {
            bigOverlay.classList.add('show');
            if (!bigIcon.classList.contains('spinning')) {
                bigIcon.classList.add('spinning');
            }
        }

        clearTimeout(shakeStopTimeout);
        shakeStopTimeout = setTimeout(stopGraggerEffect, 250);
    }

    function stopGraggerEffect() {
        graggerAudio.volume = 0; 
        const bigOverlay = document.getElementById('bigGraggerOverlay');
        const bigIcon = bigOverlay.querySelector('.big-gragger-icon');
        
        if (bigOverlay) bigOverlay.classList.remove('show');
        if (bigIcon) bigIcon.classList.remove('spinning');
    }

    let toastTimeout;
    function showToast(msg, duration = 3000) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.classList.remove('show'), duration);
    }

    function hideToast() {
        const toast = document.getElementById('toast');
        toast.classList.remove('show');
        clearTimeout(toastTimeout);
    }

    function resetGraggerState() {
        graggerObserver.disconnect();
        isGraggerAllowed = false;
        activeGraggersOnScreen = 0;
        stopGraggerEffect();
        hideToast(); 
    }
    // ===========================================

    window.onload = () => { 
        initWordCounts(); 
        setupNav(); 
        loadChapter(1); 
    };

    function highlightKamatzKatan(text, chap, vIdx) {
        let formatted = text;
        const targets =[{c:1,v:2,from:"מָ",to:"<span class='k-katan'>מָ</span>",originalTextPart:"מַלְכוֹ"},{c:1,v:10,from:"יָפְיָ",to:"<span class='k-katan'>יָ</span>פְיָ",originalTextPart:"יָפְיָהּ"},{c:1,v:16,from:"בְּאָ",to:"בְּ<span class='k-katan'>אָ</span>",originalTextPart:"בְּאָמְרָם"},{c:2,v:11,from:"חֳ",to:"<span class='k-katan'>חֳ</span>",originalTextPart:"חֳדָשִׁים"},{c:2,v:19,from:"בְּאָ",to:"בְּ<span class='k-katan'>אָ</span>",originalTextPart:"בְּאֱמֻנָה"},{c:3,v:3,from:"בְּאָ",to:"בְּ<span class='k-katan'>אָ</span>",originalTextPart:"בְּאָמְרָם"},{c:5,v:10,from:"עָ",to:"<span class='k-katan'>עָ</span>",originalTextPart:"עָשְׁרוֹ"},{c:6,v:11,from:"שָׁ",to:"<span class='k-katan'>שָׁ</span>",originalTextPart:"וַיָּשָׁב"},{c:8,v:3,from:"קָ",to:"<span class='k-katan'>קָ</span>",originalTextPart:"וַתָּקָם"},{c:9,v:3,from:"שָׂ",to:"<span class='k-katan'>שָׂ</span>",originalTextPart:"שָׂרֵי"},{c:10,v:1,from:"תָּ",to:"<span class='k-katan'>תָּ</span>",originalTextPart:"תָּקְפּוֹ"}];
        targets.forEach(t => {
            if(chap === t.c && vIdx === t.v) {
                if (t.originalTextPart) {
                    const wordRegex = new RegExp(`\\b${t.originalTextPart.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')}\\b`, 'g');
                    formatted = formatted.replace(wordRegex, (match) => match.replace(new RegExp(t.from.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'), 'g'), t.to));
                } else {
                    const simpleRegex = new RegExp(t.from.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'), 'g');
                    formatted = formatted.replace(simpleRegex, t.to);
                }
            }
        }); return formatted;
    }

    function loadChapter(num) {
        resetGraggerState();
        currentChapter = num;
        document.querySelectorAll('.chapter-btn').forEach((b, i) => b.classList.toggle('active', i+1 === num));
        applyLayout(); updateBottomNav();
        audio.src = `./audio/chap${num}.mp3`;
        // נתחיל את הנגינה רק אם הגלילה האוטומטית פעילה
        if (scrollMode === 1) {
            audio.oncanplaythrough = () => audio.play().catch(e => console.error("Audio play failed:", e));
        } else {
            audio.oncanplaythrough = () => audio.playbackRate = currentPlaybackRate;
        }
        window.scrollTo({ top: 0, behavior: 'instant' });
        updateProgress(); 
    }

    function syncText() {
        const data = (typeof megillahData !== 'undefined') ? megillahData[currentChapter] :[];
        let activeIdx = -1;
        
        const playingPasuk = document.querySelector('.pasuk.playing-now');
        if (playingPasuk) {
            activeIdx = parseInt(playingPasuk.dataset.index) || 0;
        }

        if (activeIdx === -1 || !playingPasuk) {
            for (let i = 0; i < data.length; i++) {
                if (audio.currentTime >= data[i].time) {
                    activeIdx = i;
                } else {
                    break;
                }
            }
        }


        document.querySelectorAll('.pasuk').forEach(p => p.classList.remove('playing-now'));
        const activeSpans = document.querySelectorAll(`.pasuk[data-index="${activeIdx}"]`);
        if(activeSpans.length > 0) {
            activeSpans.forEach(s => s.classList.add('playing-now'));
            
            if(scrollMode === 1) {
                const firstActiveSpan = activeSpans[0];
                const rect = firstActiveSpan.getBoundingClientRect();
                window.scrollTo({ top: rect.top + window.scrollY - (window.innerHeight / 3), behavior: 'smooth' }); 
            }
        }
        updateProgress();
    }

    function renderTextToElement(area, isDual, isChumashMode = false) {
        area.innerHTML = '';
        const dataWithNikkud = megillahData[currentChapter] ||[];
        const dataNoNikkud = megillahDataNoNikkud[currentChapter] ||[];
        let size = isDual ? (currentFontSize * 0.75) : currentFontSize;
        if (isChumashMode) size += 0.15; 
        area.style.fontSize = size + 'rem';

        area.style.textAlign = 'justify';
        area.style.wordBreak = 'break-word'; 

        dataWithNikkud.forEach((item, idx) => {
            const span = document.createElement('span');
            span.className = 'pasuk'; 
            span.dataset.index = idx;
            span.onclick = () => { audio.currentTime = item.time; audio.play(); };

            let textWithNikkud = highlightKamatzKatan(item.t, currentChapter, idx);
            textWithNikkud = insertGraggers(textWithNikkud);

            textWithNikkud = textWithNikkud.replace(/@/g, '<span class="line-break"></span>');
            textWithNikkud = textWithNikkud.replace(/&/g, '<span class="small-space"></span>');

            let verseMatch = textWithNikkud.match(/^(\([\u05D0-\u05EA]{1,3}\))/);
            let verseHtml = verseMatch ? `<span class="verse-num">${verseMatch[1]}</span>` : '';
            let clean = verseMatch ? textWithNikkud.replace(verseMatch[1], '') : textWithNikkud;

            let withoutContent = '';
            if (dataNoNikkud[idx] && dataNoNikkud[idx].t) {
                let noNikkudText = insertGraggers(dataNoNikkud[idx].t);
                noNikkudText = noNikkudText.replace(/@/g, '<span class="line-break"></span>');
                noNikkudText = noNikkudText.replace(/&/g, '<span class="small-space"></span>');

                let vMatch2 = noNikkudText.match(/^(\([\u05D0-\u05EA]{1,3}\))/);
                withoutContent = vMatch2 ? noNikkudText.replace(vMatch2[1], '') : noNikkudText;
            }

            span.innerHTML = `<span class="text-with">${verseHtml}${clean}</span><span class="text-without">${withoutContent}</span>`;
            area.appendChild(span);
        });

        setTimeout(() => {
            document.querySelectorAll('.gragger-icon').forEach(el => {
                graggerObserver.observe(el);
            });
            updateProgress(); 
        }, 100);
    }

    function cycleDisplayMode() {
        resetGraggerState();
        displayMode = (displayMode + 1) % 3;
        const labels =["לתצוגה ללא ניקוד וטעמים", "לתצוגת שתי עמודות", "לתצוגה עם ניקוד וטעמים"];
        document.getElementById('mainCycleBtn').innerText = labels[displayMode];
        applyLayout();
    }

    function applyLayout() {
        const wrapper = document.getElementById('mainWrapper');
        wrapper.innerHTML = ''; 

        // הוספת הברכות מעל הטקסט / העמודות, רק אם אנחנו בפרק א'
        if (currentChapter === 1 && typeof brachotData !== 'undefined') {
            const brachotDiv = document.createElement('div');
            brachotDiv.className = 'brachot-section';
            brachotDiv.style.fontSize = currentFontSize + 'rem'; // קבלת קנה מידה יחסי
            brachotDiv.innerHTML = `<h2 class="brachot-title">ברכות המגילה</h2><div class="brachot-text">${brachotData}</div>`;
            wrapper.appendChild(brachotDiv);
        }

        if (displayMode === 2) { 
            const grid = document.createElement('div'); grid.className = 'dual-view-container';
            const col1 = document.createElement('div'); col1.className = 'column mode-chumash'; 
            const inner1 = document.createElement('div'); inner1.className = 'text-content'; renderTextToElement(inner1, true, true); col1.appendChild(inner1); grid.appendChild(col1);
            const col2 = document.createElement('div'); col2.className = 'column mode-megillah'; 
            const inner2 = document.createElement('div'); inner2.className = 'text-content'; renderTextToElement(inner2, true, false); col2.appendChild(inner2); grid.appendChild(col2);
            wrapper.appendChild(grid);
        } else { 
            const col = document.createElement('div'); const isChumashMode = displayMode === 0; col.className = `column ${isChumashMode ? 'mode-chumash' : 'mode-megillah'}`;
            const inner = document.createElement('div'); inner.className = 'text-content'; renderTextToElement(inner, false, isChumashMode); col.appendChild(inner); wrapper.appendChild(col);
        }
    }

    function setupNav() {
        const nav = document.getElementById('chapterNav'); const letters =["","א'","ב'","ג'","ד'","ה'","ו'","ז'","ח'","ט'","י'"];
        nav.innerHTML = '';
        for(let i=1; i<=10; i++) {
            const btn = document.createElement('button'); btn.className = `chapter-btn ${i===1?'active':''}`;
            btn.innerHTML = `פרק ${letters[i]}`; btn.onclick = () => loadChapter(i); nav.appendChild(btn);
        }
    }

    function updateBottomNav() {
        document.getElementById('bottomNav').innerHTML = `<button class="nav-btn" ${currentChapter===1?'disabled':''} onclick="loadChapter(${currentChapter-1})">פרק הקודם</button><button class="nav-btn" ${currentChapter===10?'disabled':''} onclick="loadChapter(${currentChapter+1})">פרק הבא</button>`;
    }

    function changeFontSize(d) { 
        currentFontSize = Math.max(1.2, currentFontSize + (d * 0.15)); 
        // ניסיון לדחוס יותר מילים: אם הפונט גדול, נקטין את ה-line-height.
        // זהו טוויק עדין ודורש בדיקה.
        document.getElementById('textContentArea').style.lineHeight = (currentFontSize > 2.0) ? '1.5' : '1.8';
        applyLayout(); 
    }
    
    function cycleScrollMode() { 
        scrollMode = (scrollMode + 1) % 2; 
        const btn = document.getElementById('scrollCycleBtn'); 
        btn.innerText = scrollMode===0?"לגלילה אוטומטית":"לגלילה ידנית"; 
        btn.style.background = scrollMode===1?"var(--accent-color)":"rgba(255,255,255,0.1)"; 
        btn.style.color = scrollMode===1?"var(--primary-color)":"white"; 
        
        // אם עבר למצב גלילה אוטומטית, נתחיל לנגן אם לא מנגן
        if (scrollMode === 1 && audio.paused) {
            audio.play().catch(e => console.error("Audio play failed on scrollMode change:", e));
        }
    }

    function toggleSpeed() { currentSpeedIdx = (currentSpeedIdx + 1) % playSpeeds.length; currentPlaybackRate = playSpeeds[currentSpeedIdx]; audio.playbackRate = currentPlaybackRate; document.getElementById('speedBtn').innerText = '⏱ ' + currentPlaybackRate + 'x'; }
    function togglePlayPause() { audio.paused ? audio.play() : audio.pause(); }
    
    audio.onplay = () => {
        document.getElementById('playBtnIcon').innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg>';
        db.ref('plays').push({ chapter: currentChapter, time: Math.floor(audio.currentTime) + "s", date: new Date().toLocaleString('he-IL') });
    };
    audio.onpause = () => { document.getElementById('playBtnIcon').innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>'; };

    function openContactModal() { document.getElementById('contactModal').style.display = 'flex'; }
    function closeModals() { document.getElementById('contactModal').style.display = 'none'; }
    function sendMessage() {
        const name = document.getElementById('contactName').value, text = document.getElementById('contactMessage').value;
        if(name.trim() === '' || text.trim() === '') return alert("אנא מלא את כל השדות.");
        db.ref('messages').push({ name: name, text: text, date: new Date().toLocaleString('he-IL') }).then(() => { alert("הודעתך נשלחה בהצלחה!"); document.getElementById('contactName').value = ''; document.getElementById('contactMessage').value = ''; closeModals(); });
    }
</script>
