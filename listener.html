<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קול קורא המגילה - מעקב שומעים</title>
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        /* === עיצוב תוספת הרעשן הקטן בטקסט === */
        .gragger-icon {
            display: inline-block;
            width: 1.5em;
            height: 1.5em;
            margin: 0 0.3em;
            vertical-align: middle;
            opacity: 1; 
            transition: all 0.3s ease;
        }
        
        .gragger-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* === עיצוב הרעשן הענק שקופץ באמצע המסך === */
        .big-gragger-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.15s ease-out;
        }

        .big-gragger-overlay.show {
            opacity: 1;
        }

        .big-gragger-icon {
            width: 250px;
            height: 250px;
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.5));
        }

        /* האנימציה של הרעשן הענק בזמן ניעור */
        .big-gragger-icon.spinning {
            animation: shake-big-gragger 0.15s infinite alternate ease-in-out;
        }

        @keyframes shake-big-gragger {
            0% { transform: scale(1) rotate(-35deg); }
            100% { transform: scale(1.1) rotate(35deg); }
        }

        /* הודעה צפה למשתמש (טוסט) */
        .toast-notification {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 204, 0, 0.95);
            color: #000;
            padding: 15px 25px;
            border-radius: 20px;
            font-family: 'Heebo', sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
            line-height: 1.4;
            text-align: center;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            width: 85%;
            max-width: 450px;
        }
        .toast-notification.show { opacity: 1; }
    </style>
</head>
<body>

<header>
    <div class="header-text">
        <h1 onclick="window.location.href='index.html'">קול קורא המגילה</h1>
        <h2>הברה ספרדית מדויקת ע"פ מנהגי חב"ד<br>מפי הבעל קורא הרב מנחם מענדל רוזנברג שי'</h2>
    </div>
    <div class="header-actions">
        <button class="mini-btn" onclick="openContactModal()">✉️ צור קשר</button>
        <button class="mini-btn" onclick="window.location.href='admin.html'" title="ניהול">⚙️</button>
    </div>
</header>

<nav class="top-nav-bar"><div class="chapter-nav" id="chapterNav"></div></nav>

<div class="tikkun-wrapper">
    <main id="mainWrapper">
        <div id="dualContainer" class="column mode-chumash">
            <div class="text-content" id="textContentArea"></div>
        </div>
    </main>
    <div class="bottom-nav-btns" id="bottomNav"></div>
</div>

<div class="bottom-player-bar" id="listenerBar">
    <div class="player-content">
        <div style="display:flex; gap:8px; flex:1;">
            <button class="mini-btn" id="listenerScrollToggleBtn" onclick="toggleListenerScroll()">▶ גלילה אוטומטית</button>
            <button class="mini-btn" id="listenerSpeedBtn" onclick="changeListenerScrollSpeed()">💨 מהירות: 1</button>
        </div>
        <div style="display:flex; gap:8px; flex:1; justify-content: flex-end;">
            <button class="mini-btn" onclick="changeFontSize(1)">A+</button>
            <button class="mini-btn" onclick="changeFontSize(-1)">A-</button>
        </div>
    </div>
</div>

<div id="contactModal" class="modal-overlay">
    <div class="modal-box">
        <button class="close-modal" onclick="closeModals()">✖</button>
        <h3>צור קשר עם ההנהלה</h3>
        <div class="form-group"><label>שם:</label><input type="text" id="contactName" placeholder="הכנס את שמך..."></div>
        <div class="form-group"><label>הודעה:</label><textarea id="contactMessage" rows="4" placeholder="כתוב את הודעתך כאן..."></textarea></div>
        <button class="submit-btn" onclick="sendMessage()">שלח הודעה</button>
    </div>
</div>

<!-- הודעה צפה עבור חיישן הרעשן -->
<div id="toast" class="toast-notification"></div>

<!-- הרעשן הענק שקופץ באמצע המסך בזמן ניעור -->
<div id="bigGraggerOverlay" class="big-gragger-overlay">
    <div class="big-gragger-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
            <rect x="20" y="10" width="24" height="24" fill="#D2691E" stroke="#8B4513" stroke-width="2"/>
            <rect x="29" y="34" width="6" height="26" fill="#8B4513"/>
            <circle cx="32" cy="22" r="4" fill="#FFD700"/>
        </svg>
    </div>
</div>

<!-- קבצים עם גרסה 6 לעקיפת זיכרון מטמון -->
<script src="firebase-setup.js?v=6"></script>
<script src="megillahData.js?v=6"></script>
<script src="megillahDataNoNikkud.js?v=6"></script>

<script>
    let currentFontSize = window.innerWidth < 768 ? 1.7 : 2.5; 
    let currentChapter = 1;
    let listenerAutoScrollInterval = null; let isListenerScrolling = false; let listenerScrollSpeedIdx = 0;
    const listenerScrollSpeeds =[1, 1.5, 2.5, 4]; 

    // === הגדרות מערכת השמע של הרעשן ===
    const graggerAudio = new Audio('gragger.mp3'); 
    graggerAudio.preload = 'auto'; 
    graggerAudio.loop = true; 

    let lastAccX = null, lastAccY = null, lastAccZ = null;
    let shakeStopTimeout = null; 
    
    // משתנים למעקב אוטומטי אחר הרעשנים על המסך
    let isSystemUnlocked = false;
    let visibleGraggersCount = 0;
    let hasShownGraggerMessageThisChapter = false;

    // === מנגנון פתיחת שמע וחיישנים אוטומטי במגע הראשון במסך ===
    function unlockSystemInteractions() {
        if (isSystemUnlocked) return;
        
        // פתיחת נעילת השמע של הדפדפן בשקט מוחלט
        graggerAudio.volume = 0;
        graggerAudio.play().then(() => {
            graggerAudio.pause();
            graggerAudio.volume = 1; // החזרה למצב רגיל אחרי שהמערכת נפתחה
        }).catch(e => console.log("Audio unlock:", e));

        // בקשת אישור לחיישן תנועה (עבור מכשירי iOS)
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission().then(permissionState => {
                if (permissionState === 'granted') {
                    isSystemUnlocked = true;
                    window.addEventListener('devicemotion', handleMotion);
                }
            }).catch(console.error);
        } else {
            // לאנדרואיד / מכשירים אחרים
            isSystemUnlocked = true;
            window.addEventListener('devicemotion', handleMotion);
        }

        // מסיר את המאזין כי צריך לפתוח את הנעילה רק פעם אחת
        document.removeEventListener('click', unlockSystemInteractions);
        document.removeEventListener('touchstart', unlockSystemInteractions);
    }
    // מאזין לכל נגיעה במסך (למשל גלילה ראשונה) כדי לפתוח את הנעילה
    document.addEventListener('click', unlockSystemInteractions);
    document.addEventListener('touchstart', unlockSystemInteractions);


    // === מנגנון צופה: בודק תמיד אילו רעשנים נראים עכשיו על המסך ===
    const graggerObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                visibleGraggersCount++; // רעשן נכנס למסך
                
                // מקפיץ הודעה אם זה הרעשן הראשון שרואים בפרק הזה
                if (!hasShownGraggerMessageThisChapter) {
                    showToast("להפעלת הרעשן הוירטואלי ניתן לנענע את הטלפון אך ורק בזמן שקוראים את המן, ולא בזמן הקריאה שצריך לשמור על השקט.", 6000);
                    hasShownGraggerMessageThisChapter = true;
                }
            } else {
                visibleGraggersCount--; // רעשן יצא מהמסך
                if (visibleGraggersCount <= 0) {
                    visibleGraggersCount = 0;
                    stopGraggerEffect(); // מכבה רעש אם עברנו את הפסוק תוך כדי ניעור
                }
            }
        });
    }, { threshold: 0.1 });


    window.onload = () => { setupNav(); loadChapter(1); };

    function highlightKamatzKatan(text, chap, vIdx) {
        let formatted = text;
        const targets =[{c:1,v:2,from:"מָ",to:"<span class='k-katan'>מָ</span>",originalTextPart:"מַלְכוֹ"},{c:1,v:10,from:"יָפְיָ",to:"<span class='k-katan'>יָ</span>פְיָ",originalTextPart:"יָפְיָהּ"},{c:1,v:16,from:"בְּאָ",to:"בְּ<span class='k-katan'>אָ</span>",originalTextPart:"בְּאָמְרָם"},{c:2,v:11,from:"חֳ",to:"<span class='k-katan'>חֳ</span>",originalTextPart:"חֳדָשִׁים"},{c:2,v:19,from:"בְּאָ",to:"בְּ<span class='k-katan'>אָ</span>",originalTextPart:"בְּאֱמֻנָה"},{c:3,v:3,from:"בְּאָ",to:"בְּ<span class='k-katan'>אָ</span>",originalTextPart:"בְּאָמְרָם"},{c:5,v:10,from:"עָ",to:"<span class='k-katan'>עָ</span>",originalTextPart:"עָשְׁרוֹ"},{c:6,v:11,from:"שָׁ",to:"<span class='k-katan'>שָׁ</span>",originalTextPart:"וַיָּשָׁב"},{c:8,v:3,from:"קָ",to:"<span class='k-katan'>קָ</span>",originalTextPart:"וַתָּקָם"},{c:9,v:3,from:"שָׂ",to:"<span class='k-katan'>שָׂ</span>",originalTextPart:"שָׂרֵי"},{c:10,v:1,from:"תָּ",to:"<span class='k-katan'>תָּ</span>",originalTextPart:"תָּקְפּוֹ"}];
        targets.forEach(t => {
            if(chap === t.c && vIdx === t.v) {
                if (t.originalTextPart) {
                    const wordRegex = new RegExp(`\\b${t.originalTextPart.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')}\\b`, 'g');
                    formatted = formatted.replace(wordRegex, (match) => match.replace(new RegExp(t.from.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'), 'g'), t.to));
                } else {
                    const simpleRegex = new RegExp(t.from.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'), 'g');
                    formatted = formatted.replace(simpleRegex, t.to);
                }
            }
        }); return formatted;
    }

    // פונקציה: החלפת ### ברעשן חזותי (ללא כפתור לחיצה יותר)
    function insertGraggers(text) {
        const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect x="20" y="10" width="24" height="24" fill="#D2691E" stroke="#8B4513" stroke-width="2"/><rect x="29" y="34" width="6" height="26" fill="#8B4513"/><circle cx="32" cy="22" r="4" fill="#FFD700"/></svg>`;
        const graggerHtml = `<span class="gragger-icon">${svgIcon}</span>`;
        return text.replace(/###/g, graggerHtml);
    }

    function renderTextToElement(area) {
        area.innerHTML = '';
        const dataWithNikkud = megillahData[currentChapter] ||[];
        area.style.fontSize = (currentFontSize + 0.15) + 'rem';

        dataWithNikkud.forEach((item, idx) => {
            const span = document.createElement('span'); span.className = 'pasuk';
            let textWithNikkud = highlightKamatzKatan(item.t, currentChapter, idx);
            
            textWithNikkud = insertGraggers(textWithNikkud);
            
            let verseMatch = textWithNikkud.match(/^(\([\u05D0-\u05EA]{1,3}\))/);
            let verseHtml = verseMatch ? `<span class="verse-num">${verseMatch[1]}</span>` : '';
            let clean = verseMatch ? textWithNikkud.replace(verseMatch[1], '') : textWithNikkud;
            span.innerHTML = `<span class="text-with">${verseHtml}${clean}</span>`;
            area.appendChild(span);
        });

        // מצמיד את הסורק לכל הרעשנים שנוצרו עכשיו על המסך
        const newGraggers = document.querySelectorAll('.gragger-icon');
        newGraggers.forEach(el => graggerObserver.observe(el));
    }


    // === טיפול בניעור הטלפון ===
    function handleMotion(event) {
        // מתעלם לגמרי מהתנועה אם אין כרגע רעשן על המסך
        if (visibleGraggersCount <= 0) return;

        let acc = event.accelerationIncludingGravity;
        if (!acc) return;

        if (lastAccX !== null) {
            let deltaX = Math.abs(acc.x - lastAccX);
            let deltaY = Math.abs(acc.y - lastAccY);
            let deltaZ = Math.abs(acc.z - lastAccZ);

            if (deltaX + deltaY + deltaZ > 12) {
                startGraggerEffect();
            }
        }
        lastAccX = acc.x; lastAccY = acc.y; lastAccZ = acc.z;
    }

    function startGraggerEffect() {
        if (graggerAudio.paused) {
            graggerAudio.play().catch(e => console.log("Blocked:", e));
        }

        const bigOverlay = document.getElementById('bigGraggerOverlay');
        const bigIcon = bigOverlay.querySelector('.big-gragger-icon');
        
        bigOverlay.classList.add('show');
        if (!bigIcon.classList.contains('spinning')) {
            bigIcon.classList.add('spinning');
        }

        clearTimeout(shakeStopTimeout);
        shakeStopTimeout = setTimeout(stopGraggerEffect, 250);
    }

    function stopGraggerEffect() {
        graggerAudio.pause();
        
        const bigOverlay = document.getElementById('bigGraggerOverlay');
        const bigIcon = bigOverlay.querySelector('.big-gragger-icon');
        
        if (bigOverlay) bigOverlay.classList.remove('show');
        if (bigIcon) bigIcon.classList.remove('spinning');
    }

    let toastTimeout;
    function showToast(msg, duration = 3000) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.classList.remove('show'), duration);
    }
    // ==========================================

    function loadChapter(num) {
        if (isListenerScrolling) toggleListenerScroll();
        currentChapter = num;
        
        // איפוס מונים במעבר פרק
        visibleGraggersCount = 0;
        hasShownGraggerMessageThisChapter = false;
        stopGraggerEffect();
        
        document.querySelectorAll('.chapter-btn').forEach((b, i) => b.classList.toggle('active', i+1 === num));
        applyLayout(); updateBottomNav();
        window.scrollTo({ top: 0, behavior: 'instant' });
    }

    function applyLayout() {
        const wrapper = document.getElementById('mainWrapper'); wrapper.innerHTML = ''; 
        const col = document.createElement('div'); col.className = 'column mode-chumash';
        const inner = document.createElement('div'); inner.className = 'text-content'; renderTextToElement(inner); col.appendChild(inner); wrapper.appendChild(col);
    }

    function setupNav() {
        const nav = document.getElementById('chapterNav'); const letters =["","א'","ב'","ג'","ד'","ה'","ו'","ז'","ח'","ט'","י'"];
        nav.innerHTML = '';
        for(let i=1; i<=10; i++) {
            const btn = document.createElement('button'); btn.className = `chapter-btn ${i===1?'active':''}`;
            btn.innerHTML = `פרק ${letters[i]}`; btn.onclick = () => loadChapter(i); nav.appendChild(btn);
        }
    }

    function updateBottomNav() {
        document.getElementById('bottomNav').innerHTML = `<button class="nav-btn" ${currentChapter===1?'disabled':''} onclick="loadChapter(${currentChapter-1})">פרק הקודם</button><button class="nav-btn" ${currentChapter===10?'disabled':''} onclick="loadChapter(${currentChapter+1})">פרק הבא</button>`;
    }

    function changeFontSize(d) { currentFontSize = Math.max(1.2, currentFontSize + (d * 0.15)); applyLayout(); }

    function toggleListenerScroll() {
        isListenerScrolling = !isListenerScrolling;
        const btn = document.getElementById('listenerScrollToggleBtn');
        if (isListenerScrolling) {
            btn.style.background = "var(--accent-color)"; btn.style.color = "var(--primary-color)"; btn.innerHTML = "⏸ עצור גלילה";
            listenerAutoScrollInterval = setInterval(() => {
                window.scrollBy(0, listenerScrollSpeeds[listenerScrollSpeedIdx]);
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight) toggleListenerScroll();
            }, 30);
        } else {
            btn.style.background = "rgba(255,255,255,0.1)"; btn.style.color = "white"; btn.innerHTML = "▶ גלילה אוטומטית";
            clearInterval(listenerAutoScrollInterval);
        }
    }

    function changeListenerScrollSpeed() {
        listenerScrollSpeedIdx = (listenerScrollSpeedIdx + 1) % listenerScrollSpeeds.length;
        document.getElementById('listenerSpeedBtn').innerText = '💨 מהירות: ' + (listenerScrollSpeedIdx + 1);
    }

    function openContactModal() { document.getElementById('contactModal').style.display = 'flex'; }
    function closeModals() { document.getElementById('contactModal').style.display = 'none'; }
    function sendMessage() {
        const name = document.getElementById('contactName').value, text = document.getElementById('contactMessage').value;
        if(name.trim() === '' || text.trim() === '') return alert("אנא מלא את כל השדות.");
        db.ref('messages').push({ name: name, text: text, date: new Date().toLocaleString('he-IL') }).then(() => { alert("הודעתך נשלחה בהצלחה!"); document.getElementById('contactName').value = ''; document.getElementById('contactMessage').value = ''; closeModals(); });
    }
</script>
</body>
</html>
