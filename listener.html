<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קול קורא המגילה - מעקב שומעים</title>
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
    /* === עיצוב תוספת הרעשן הקטן בטקסט === */
    .gragger-icon {
        display: inline-block;
        width: 1.5em;
        height: 1.5em;
        margin: 0 0.3em;
        vertical-align: middle;
        cursor: default; 
        opacity: 1; 
        transition: all 0.3s ease;
    }
    
    .gragger-icon svg {
        width: 100%;
        height: 100%;
        display: block;
    }
    
    /* מצב פעיל של הרעשן הקטן (מסמן שהוא מוכן לניעור) */
    .gragger-icon.active {
        background-color: rgba(255, 204, 0, 0.2);
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        transform: scale(1.1);
    }

    /* === עיצוב הרעשן הענק שקופץ באמצע המסך === */
    .big-gragger-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.6); 
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10000;
        opacity: 0;
        pointer-events: none; 
        transition: opacity 0.15s ease-out;
    }

    .big-gragger-overlay.show {
        opacity: 1;
    }

    .big-gragger-icon {
        width: 250px;
        height: 250px;
        filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.5));
    }

    /* האנימציה של הרעשן הענק בזמן ניעור */
    .big-gragger-icon.spinning {
        animation: shake-big-gragger 0.15s infinite alternate ease-in-out;
    }

    @keyframes shake-big-gragger {
        0% { transform: scale(1) rotate(-35deg); }
        100% { transform: scale(1.1) rotate(35deg); }
    }

    /* הודעה צפה למשתמש (טוסט) */
    .toast-notification {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 204, 0, 0.95);
        color: #000;
        padding: 10px 25px;
        border-radius: 30px;
        font-family: 'Heebo', sans-serif;
        font-weight: bold;
        font-size: 1rem;
        text-align: center;
        z-index: 9999;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
        width: 80%;
        max-width: 400px;
    }
    .toast-notification.show { opacity: 1; }

    /* === עיצובים חדשים לרצף הפרקים והברכות === */
    .chapter-heading {
        text-align: center;
        color: #FFD700;
        font-size: 2.5em;
        margin: 50px 0 20px 0;
        padding-bottom: 15px;
        border-bottom: 2px dashed rgba(255, 215, 0, 0.3);
        font-family: 'Frank Ruhl Libre', serif;
    }
    
    .brachot-section {
        text-align: center;
        margin-bottom: 40px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 15px;
        border: 1px solid rgba(255, 215, 0, 0.2);
    }

    .brachot-title {
        color: #FFD700;
        font-size: 2.2em;
        margin-bottom: 20px;
        font-family: 'Frank Ruhl Libre', serif;
    }

    .brachot-text {
        line-height: 1.8;
    }
</style>
</head>
<body>

<header>
    <div class="header-text">
        <h1 onclick="window.location.href='index.html'">קול קורא המגילה</h1>
        <h2>הברה ספרדית מדויקת ע"פ מנהגי חב"ד<br>מפי הבעל קורא הרב מנחם מענדל רוזנברג שי'</h2>
    </div>
    <div class="header-actions">
        <button class="mini-btn" onclick="openContactModal()">✉️ צור קשר</button>
        <button class="mini-btn" onclick="window.location.href='admin.html'" title="ניהול">⚙️</button>
    </div>
</header>

<div class="tikkun-wrapper">
    <main id="mainWrapper">
        <div id="dualContainer" class="column mode-chumash">
            <div class="text-content" id="textContentArea"></div>
        </div>
    </main>
</div>

<div class="bottom-player-bar" id="listenerBar">
    <!-- פס התקדמות קריאה שיושב בדיוק על הגבול העליון של הסרגל -->
    <div id="progressContainer" style="position: absolute; top: 0; left: 0; right: 0; height: 3px; background: rgba(255, 255, 255, 0.1); z-index: 10;">
        <div id="progressBarFill" style="position: absolute; top: 0; right: 0; height: 100%; width: 0%; background: linear-gradient(to left, #FFD700, #FFA500); box-shadow: 0 0 10px rgba(255, 215, 0, 0.8); transition: width 0.3s ease;"></div>
    </div>
    
    <div class="player-content">
        <div style="display:flex; gap:8px; flex:1;">
            <button class="mini-btn" id="listenerScrollToggleBtn" onclick="toggleListenerScroll()">▶ גלילה אוטומטית</button>
            <button class="mini-btn" id="listenerSpeedBtn" onclick="changeListenerScrollSpeed()">💨 מהירות: 1</button>
        </div>
        <div style="display:flex; gap:8px; flex:1; justify-content: flex-end;">
            <button class="mini-btn" onclick="changeFontSize(1)">A+</button>
            <button class="mini-btn" onclick="changeFontSize(-1)">A-</button>
        </div>
    </div>
</div>

<div id="contactModal" class="modal-overlay">
    <div class="modal-box">
        <button class="close-modal" onclick="closeModals()">✖</button>
        <h3>צור קשר עם ההנהלה</h3>
        <div class="form-group"><label>שם:</label><input type="text" id="contactName" placeholder="הכנס את שמך..."></div>
        <div class="form-group"><label>הודעה:</label><textarea id="contactMessage" rows="4" placeholder="כתוב את הודעתך כאן..."></textarea></div>
        <button class="submit-btn" onclick="sendMessage()">שלח הודעה</button>
    </div>
</div>

<!-- הודעה צפה עבור חיישן הרעשן -->
<div id="toast" class="toast-notification"></div>

<!-- הרעשן הענק שקופץ באמצע המסך בזמן ניעור -->
<div id="bigGraggerOverlay" class="big-gragger-overlay">
    <div class="big-gragger-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
            <rect x="20" y="10" width="24" height="24" fill="#D2691E" stroke="#8B4513" stroke-width="2"/>
            <rect x="29" y="34" width="6" height="26" fill="#8B4513"/>
            <circle cx="32" cy="22" r="4" fill="#FFD700"/>
        </svg>
    </div>
</div>

<!-- קבצים חיצוניים -->
<script src="firebase-setup.js?v=5"></script>
<script src="brachotData.js?v=1"></script> <!-- קובץ הברכות החדש -->
<script src="megillahData.js?v=5"></script>
<script src="megillahDataNoNikkud.js?v=5"></script>

<script>
    let currentFontSize = window.innerWidth < 768 ? 1.7 : 2.5; 
    let listenerAutoScrollInterval = null; let isListenerScrolling = false; let listenerScrollSpeedIdx = 0;
    const listenerScrollSpeeds =[1, 1.5, 2.5, 4]; 

    // === הגדרות מערכת השמע של הרעשן ===
    const graggerAudio = new Audio('gragger.mp3'); 
    graggerAudio.preload = 'auto'; 
    graggerAudio.loop = true; 

    // משתנים למעקב אוטומטי אחר הרעשנים במסך
    let isGraggerAllowed = false; 
    let activeGraggersOnScreen = 0;
    let sensorsInitialized = false;
    let lastAccX = null, lastAccY = null, lastAccZ = null;
    let shakeStopTimeout = null; 

    // === משתנים לחישוב התקדמות קריאה (פס חזותי בלבד) ===
    let chapWordCounts = {};
    let totalMegillahWords = 0;
    let scrollTimeout = null;

    // ספירת כל המילים במגילה בטעינה ראשונית (מאחורי הקלעים)
    function initWordCounts() {
        if (typeof megillahData === 'undefined') return;
        totalMegillahWords = 0;
        for (let c = 1; c <= 10; c++) {
            chapWordCounts[c] = { pesukim:[], total: 0 };
            let currentChapWords = 0;
            if (!megillahData[c]) continue;
            megillahData[c].forEach(p => {
                let cleanText = p.t.replace(/^(\([\u05D0-\u05EA]{1,3}\))/, '');
                let wordsCount = cleanText.trim().split(/\s+/).length;
                chapWordCounts[c].pesukim.push(wordsCount);
                currentChapWords += wordsCount;
            });
            chapWordCounts[c].total = currentChapWords;
            totalMegillahWords += currentChapWords;
        }
    }

    // מציאת הפסוק שכרגע על המסך (מותאם לרצף מלא)
    function getActivePasuk() {
        let pesukim = document.querySelectorAll('.pasuk');
        if (pesukim.length === 0) return {c: 1, idx: 0};
        for (let p of pesukim) {
            let rect = p.getBoundingClientRect();
            if (rect.bottom > 120) {
                return {
                    c: parseInt(p.dataset.chapter) || 1,
                    idx: parseInt(p.dataset.index) || 0
                };
            }
        }
        let last = pesukim[pesukim.length - 1];
        return {
            c: parseInt(last.dataset.chapter) || 10,
            idx: parseInt(last.dataset.index) || 0
        };
    }

    // מחשב כמה מילים נקראו במצטבר (מותאם לרצף מלא)
    function getCurrentWordsRead(active) {
        let read = 0;
        for (let c = 1; c < active.c; c++) {
            if (chapWordCounts[c]) read += chapWordCounts[c].total;
        }
        if (chapWordCounts[active.c]) {
            for (let i = 0; i <= active.idx; i++) {
                if (chapWordCounts[active.c].pesukim[i]) {
                    read += chapWordCounts[active.c].pesukim[i];
                }
            }
        }
        return read;
    }

    // מעדכן אך ורק את אורך הפס העיצובי
    function updateProgress() {
        if (totalMegillahWords === 0) return;
        
        let active = getActivePasuk();
        let currentWords = getCurrentWordsRead(active);
        let percent = (currentWords / totalMegillahWords) * 100;
        
        // מוודא שהאחוזים לא עפים מעל 100
        percent = Math.min(100, Math.max(0, percent));
        
        document.getElementById('progressBarFill').style.width = percent + '%';
    }

    // מאזין לגלילה כדי לקדם את הפס בצורה חלקה
    window.addEventListener('scroll', () => {
        if (!scrollTimeout) {
            scrollTimeout = setTimeout(() => {
                updateProgress();
                scrollTimeout = null;
            }, 100); 
        }
    });

    // === סוף קוד התקדמות ===

    function initSensorsOnFirstTouch() {
        if (sensorsInitialized) return;
        
        graggerAudio.volume = 0;
        graggerAudio.play().catch(() => {});

        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission().then(permissionState => {
                if (permissionState === 'granted') {
                    window.addEventListener('devicemotion', handleMotion);
                }
            }).catch(console.error);
        } else {
            window.addEventListener('devicemotion', handleMotion);
        }

        sensorsInitialized = true;
        document.removeEventListener('click', initSensorsOnFirstTouch);
        document.removeEventListener('touchstart', initSensorsOnFirstTouch);
    }

    document.addEventListener('click', initSensorsOnFirstTouch);
    document.addEventListener('touchstart', initSensorsOnFirstTouch);

    const graggerObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                if (!entry.target.classList.contains('active')) {
                    entry.target.classList.add('active'); 
                    activeGraggersOnScreen++;
                    
                    if (activeGraggersOnScreen === 1) { 
                        isGraggerAllowed = true;
                        showToast("נער את הטלפון כדי להרעיש 🪇", 3500); 
                        if (graggerAudio.paused) {
                            graggerAudio.volume = 0;
                            graggerAudio.play().catch(() => {});
                        }
                    }
                }
            } else {
                if (entry.target.classList.contains('active')) {
                    entry.target.classList.remove('active'); 
                    activeGraggersOnScreen = Math.max(0, activeGraggersOnScreen - 1);
                    
                    if (activeGraggersOnScreen === 0) { 
                        isGraggerAllowed = false;
                        stopGraggerEffect(); 
                        hideToast();
                    }
                }
            }
        });
    }, { threshold: 0.1 }); 

    window.onload = () => { 
        initWordCounts(); 
        loadContent(); 
    };

    function highlightKamatzKatan(text, chap, vIdx) {
        let formatted = text;
        const targets =[{c:1,v:2,from:"מָ",to:"<span class='k-katan'>מָ</span>",originalTextPart:"מַלְכוֹ"},{c:1,v:10,from:"יָפְיָ",to:"<span class='k-katan'>יָ</span>פְיָ",originalTextPart:"יָפְיָהּ"},{c:1,v:16,from:"בְּאָ",to:"בְּ<span class='k-katan'>אָ</span>",originalTextPart:"בְּאָמְרָם"},{c:2,v:11,from:"חֳ",to:"<span class='k-katan'>חֳ</span>",originalTextPart:"חֳדָשִׁים"},{c:2,v:19,from:"בְּאָ",to:"בְּ<span class='k-katan'>אָ</span>",originalTextPart:"בְּאֱמֻנָה"},{c:3,v:3,from:"בְּאָ",to:"בְּ<span class='k-katan'>אָ</span>",originalTextPart:"בְּאָמְרָם"},{c:5,v:10,from:"עָ",to:"<span class='k-katan'>עָ</span>",originalTextPart:"עָשְׁרוֹ"},{c:6,v:11,from:"שָׁ",to:"<span class='k-katan'>שָׁ</span>",originalTextPart:"וַיָּשָׁב"},{c:8,v:3,from:"קָ",to:"<span class='k-katan'>קָ</span>",originalTextPart:"וַתָּקָם"},{c:9,v:3,from:"שָׂ",to:"<span class='k-katan'>שָׂ</span>",originalTextPart:"שָׂרֵי"},{c:10,v:1,from:"תָּ",to:"<span class='k-katan'>תָּ</span>",originalTextPart:"תָּקְפּוֹ"}];
        targets.forEach(t => {
            if(chap === t.c && vIdx === t.v) {
                if (t.originalTextPart) {
                    const wordRegex = new RegExp(`\\b${t.originalTextPart.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')}\\b`, 'g');
                    formatted = formatted.replace(wordRegex, (match) => match.replace(new RegExp(t.from.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'), 'g'), t.to));
                } else {
                    const simpleRegex = new RegExp(t.from.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'), 'g');
                    formatted = formatted.replace(simpleRegex, t.to);
                }
            }
        }); return formatted;
    }

    function insertGraggers(text) {
        const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect x="20" y="10" width="24" height="24" fill="#D2691E" stroke="#8B4513" stroke-width="2"/><rect x="29" y="34" width="6" height="26" fill="#8B4513"/><circle cx="32" cy="22" r="4" fill="#FFD700"/></svg>`;
        const graggerHtml = `<span class="gragger-icon">${svgIcon}</span>`;
        return text.replace(/###/g, graggerHtml);
    }

    function renderTextToElement(area) {
        area.innerHTML = '';
        area.style.fontSize = (currentFontSize + 0.15) + 'rem';

        // הוספת הברכות בהתחלה (נשאבות מהקובץ החיצוני)
        if (typeof brachotData !== 'undefined') {
            const brachotDiv = document.createElement('div');
            brachotDiv.className = 'brachot-section';
            brachotDiv.innerHTML = `<h2 class="brachot-title">ברכות המגילה</h2><div class="brachot-text">${brachotData}</div>`;
            area.appendChild(brachotDiv);
        }

        const letters = ["", "א'", "ב'", "ג'", "ד'", "ה'", "ו'", "ז'", "ח'", "ט'", "י'"];

        // לולאה שעוברת על כל עשרת הפרקים ומדפיסה אותם ברצף
        for (let c = 1; c <= 10; c++) {
            const dataWithNikkud = megillahData[c] || [];
            if (dataWithNikkud.length === 0) continue;

            // יצירת כותרת יפה לכל פרק
            const heading = document.createElement('h2');
            heading.className = 'chapter-heading';
            heading.innerText = `פרק ${letters[c]}`;
            area.appendChild(heading);

            // הדפסת הפסוקים של אותו פרק
            dataWithNikkud.forEach((item, idx) => {
                const span = document.createElement('span'); 
                span.className = 'pasuk';
                span.dataset.chapter = c; // תגית שעוזרת למדוד את ההתקדמות ברצף
                span.dataset.index = idx; 
                
                let textWithNikkud = highlightKamatzKatan(item.t, c, idx);
                textWithNikkud = insertGraggers(textWithNikkud);
                
                let verseMatch = textWithNikkud.match(/^(\([\u05D0-\u05EA]{1,3}\))/);
                let verseHtml = verseMatch ? `<span class="verse-num">${verseMatch[1]}</span>` : '';
                let clean = verseMatch ? textWithNikkud.replace(verseMatch[1], '') : textWithNikkud;
                span.innerHTML = `<span class="text-with">${verseHtml}${clean}</span>`;
                area.appendChild(span);
            });
        }

        setTimeout(() => {
            document.querySelectorAll('.gragger-icon').forEach(el => {
                graggerObserver.observe(el);
            });
            updateProgress();
        }, 100);
    }

    function handleMotion(event) {
        let acc = event.accelerationIncludingGravity;
        if (!acc) return;

        if (lastAccX !== null) {
            let deltaX = Math.abs(acc.x - lastAccX);
            let deltaY = Math.abs(acc.y - lastAccY);
            let deltaZ = Math.abs(acc.z - lastAccZ);

            if (isGraggerAllowed && (deltaX + deltaY + deltaZ > 12)) {
                startGraggerEffect();
            }
        }
        
        lastAccX = acc.x; 
        lastAccY = acc.y; 
        lastAccZ = acc.z;
    }

    function startGraggerEffect() {
        graggerAudio.volume = 1;
        if (graggerAudio.paused) {
            graggerAudio.play().catch(()=>{});
        }

        const bigOverlay = document.getElementById('bigGraggerOverlay');
        const bigIcon = bigOverlay.querySelector('.big-gragger-icon');
        
        if (bigOverlay && bigIcon) {
            bigOverlay.classList.add('show');
            if (!bigIcon.classList.contains('spinning')) {
                bigIcon.classList.add('spinning');
            }
        }

        clearTimeout(shakeStopTimeout);
        shakeStopTimeout = setTimeout(stopGraggerEffect, 250);
    }

    function stopGraggerEffect() {
        graggerAudio.volume = 0; 
        
        const bigOverlay = document.getElementById('bigGraggerOverlay');
        const bigIcon = bigOverlay.querySelector('.big-gragger-icon');
        
        if (bigOverlay) bigOverlay.classList.remove('show');
        if (bigIcon) bigIcon.classList.remove('spinning');
    }

    let toastTimeout;
    function showToast(msg, duration = 3000) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.classList.remove('show'), duration);
    }

    function hideToast() {
        const toast = document.getElementById('toast');
        toast.classList.remove('show');
        clearTimeout(toastTimeout);
    }

    // טעינת התוכן הכולל במקום פרק בודד
    function loadContent() {
        if (isListenerScrolling) toggleListenerScroll();
        
        graggerObserver.disconnect();
        isGraggerAllowed = false;
        activeGraggersOnScreen = 0;
        stopGraggerEffect();
        hideToast(); 

        applyLayout(); 
        window.scrollTo({ top: 0, behavior: 'instant' });
    }

    function applyLayout() {
        const wrapper = document.getElementById('mainWrapper'); wrapper.innerHTML = ''; 
        const col = document.createElement('div'); col.className = 'column mode-chumash';
        const inner = document.createElement('div'); inner.className = 'text-content'; renderTextToElement(inner); col.appendChild(inner); wrapper.appendChild(col);
    }

    function changeFontSize(d) { 
        currentFontSize = Math.max(1.2, currentFontSize + (d * 0.15)); 
        applyLayout(); 
        setTimeout(updateProgress, 100); 
    }

    function toggleListenerScroll() {
        isListenerScrolling = !isListenerScrolling;
        const btn = document.getElementById('listenerScrollToggleBtn');
        if (isListenerScrolling) {
            btn.style.background = "var(--accent-color)"; btn.style.color = "var(--primary-color)"; btn.innerHTML = "⏸ עצור גלילה";
            listenerAutoScrollInterval = setInterval(() => {
                window.scrollBy(0, listenerScrollSpeeds[listenerScrollSpeedIdx]);
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight) toggleListenerScroll();
            }, 30);
        } else {
            btn.style.background = "rgba(255,255,255,0.1)"; btn.style.color = "white"; btn.innerHTML = "▶ גלילה אוטומטית";
            clearInterval(listenerAutoScrollInterval);
        }
    }

    function changeListenerScrollSpeed() {
        listenerScrollSpeedIdx = (listenerScrollSpeedIdx + 1) % listenerScrollSpeeds.length;
        document.getElementById('listenerSpeedBtn').innerText = '💨 מהירות: ' + (listenerScrollSpeedIdx + 1);
    }

    function openContactModal() { document.getElementById('contactModal').style.display = 'flex'; }
    function closeModals() { document.getElementById('contactModal').style.display = 'none'; }
    function sendMessage() {
        const name = document.getElementById('contactName').value, text = document.getElementById('contactMessage').value;
        if(name.trim() === '' || text.trim() === '') return alert("אנא מלא את כל השדות.");
        db.ref('messages').push({ name: name, text: text, date: new Date().toLocaleString('he-IL') }).then(() => { alert("הודעתך נשלחה בהצלחה!"); document.getElementById('contactName').value = ''; document.getElementById('contactMessage').value = ''; closeModals(); });
    }
</script>

</body>
</html>
