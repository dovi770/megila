<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קול המגילה - הכנה למבצעים</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fdfbf7;
            --primary-color: #0b1c2c;
            --accent-color: #d4af37;
            --text-color: #1a1a1a;
            --playing-bg: rgba(11, 28, 44, 0.08);
            --bottom-bar-height: 110px;
        }

        @font-face {
            font-family: 'Guttman Stam';
            src: url('./fonts/guttman-stam.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: var(--bottom-bar-height);
            overflow-x: hidden;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px 40px;
            border-bottom: 4px solid var(--accent-color);
            display: flex; justify-content: space-between; align-items: center;
            position: relative;
        }

        header h1 { margin: 0; font-family: 'Frank Ruhl Libre', serif; font-size: 2.5rem; flex: 1; text-align: right; }
        header h2 { margin: 0; color: var(--accent-color); font-size: 1rem; flex: 1; text-align: left; font-weight: 400; line-height: 1.4; }

        /* סרגל פרקים - תיקון הצגה לנייד */
        .top-nav-bar {
            background-color: #fff;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow-x: auto;
            display: flex;
            justify-content: flex-start;
            padding: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .chapter-nav { display: flex; gap: 8px; padding-right: 10px; padding-left: 20px; }

        .chapter-btn {
            background-color: #f8f8f8; color: var(--primary-color);
            border: 1px solid #ddd; padding: 8px 15px;
            border-radius: 8px; cursor: pointer;
            font-weight: 600; white-space: nowrap; transition: 0.2s;
        }

        .chapter-btn.active { 
            background-color: var(--accent-color); 
            border-color: var(--accent-color);
            color: var(--primary-color);
        }

        .instructions-hint {
            text-align: center; font-size: 0.9rem; color: #666;
            margin: 15px 0 5px 0; font-weight: bold;
        }

        /* עיצוב המגילה והעמודות */
        .tikkun-wrapper { 
            max-width: 1000px; margin: 20px auto; padding: 0 20px;
        }

        .dual-view-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
        }

        .column { 
            background: white; padding: 30px; border-radius: 12px; 
            border-bottom: 5px solid var(--accent-color); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
        }

        .text-content { 
            font-family: 'Guttman Stam', serif; 
            line-height: 2; 
            text-align: justify; 
            word-wrap: break-word;
        }
        
        .verse-num { color: #999; font-size: 0.55em; margin-left: 8px; font-family: 'Heebo', sans-serif; font-weight: normal; }
        .pasuk { border-radius: 6px; padding: 0 4px; cursor: pointer; transition: 0.2s; display: inline; }
        .pasuk.playing-now { background-color: var(--playing-bg); border-bottom: 3px solid var(--accent-color); }

        /* ניהול מצבי תצוגה */
        .mode-chumash .text-without { display: none; }
        .mode-megillah .text-with, .mode-megillah .verse-num { display: none; }
        
        /* כפתורי שליטה צפים */
        .floating-controls {
            position: fixed; bottom: calc(var(--bottom-bar-height) + 20px);
            left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1001;
        }

        .f-btn {
            background: var(--accent-color); color: var(--primary-color);
            border: none; padding: 12px 18px; border-radius: 50px;
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer;
            font-family: 'Heebo', sans-serif;
        }

        /* נגן תחתון */
        .bottom-player-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background-color: var(--primary-color); height: var(--bottom-bar-height);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }

        .player-content { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 800px; padding: 0 20px; }
        
        .main-play-btn {
            background: var(--accent-color); border: none; width: 62px; height: 62px;
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .main-play-btn svg { width: 30px; height: 30px; fill: var(--primary-color); }

        .mini-btn {
            background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 0.85rem;
            min-width: 45px; text-align: center;
        }

        /* הודעת התראה */
        #scrollToast {
            position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: white; padding: 10px 20px;
            border-radius: 25px; font-size: 0.85rem; display: none; z-index: 2001;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* התאמות לנייד */
        @media (max-width: 768px) {
            header { flex-direction: column; padding: 15px; text-align: center; }
            header h1 { font-size: 2rem; text-align: center; }
            header h2 { text-align: center; font-size: 0.9rem; margin-top: 10px; }
            .dual-view-container { grid-template-columns: 1fr; }
            .dual-mode-btn { display: none; } /* נסתיר מבט כפול בנייד במצב אנכי */
            .f-btn { padding: 10px 15px; font-size: 0.85rem; }
        }

        /* הצגת מבט כפול בטלפון לרוחב */
        @media (max-height: 500px) and (orientation: landscape) {
            .dual-view-container { grid-template-columns: 1fr 1fr; }
            .dual-mode-btn { display: block; }
            header { padding: 5px 20px; }
            header h1 { font-size: 1.5rem; }
            header h2 { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <h1>קול המגילה</h1>
        <h2>הברה ספרדית מדויקת ע"פ מנהגי חב"ד<br>מפי הבעל קורא הרב מנחם מענדל רוזנברג שי'</h2>
    </header>

    <nav class="top-nav-bar">
        <div class="chapter-nav" id="chapterNav"></div>
    </nav>

    <div class="instructions-hint">כאשר לוחצים על פסוק זה מדלג לשמיעת הפסוק המסוים שלחצת.</div>

    <div class="floating-controls">
        <button class="f-btn dual-mode-btn" id="dualViewBtn" onclick="toggleDualMode()">צפייה בשתי עמודות</button>
        <button class="f-btn" id="modeToggleBtn" onclick="toggleMode()">ללא ניקוד וטעמים</button>
    </div>

    <main class="tikkun-wrapper" id="mainWrapper">
        <div id="dualContainer" class="column mode-chumash">
            <div class="text-content" id="textContentArea"></div>
        </div>
    </main>

    <div id="scrollToast">לא ניתן לגלול מפני שמוגדר על מצב גלילה אוטומטית. אם ברצונך לגלול בטל את הלחצן "גלילה אוטומטית".</div>

    <audio id="megillahAudio" ontimeupdate="syncText()"></audio>

    <div class="bottom-player-bar">
        <div class="player-content">
            <div style="display:flex; gap:8px; flex:1;">
                <button class="mini-btn" id="speedBtn" onclick="toggleSpeed()">⏱ 1x</button>
                <button class="mini-btn" id="scrollToggleBtn" onclick="toggleAutoScroll()">גלילה ידנית</button>
            </div>

            <button class="main-play-btn" onclick="togglePlayPause()">
                <div id="playBtnIcon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg></div>
            </button>

            <div style="display:flex; gap:8px; flex:1; justify-content: flex-end;">
                <button class="mini-btn" onclick="changeFontSize(1)">A+</button>
                <button class="mini-btn" onclick="changeFontSize(-1)">A-</button>
            </div>
        </div>
    </div>

    <!-- 1. טעינת המידע מקובץ חיצוני - וודא שהקובץ קיים בתיקייה -->
    <script src="megillahData.js"></script>

    <!-- 2. קוד האתר -->
    <script>
        // הגדרות התחלתיות
        let currentFontSize = window.innerWidth < 768 ? 1.7 : 2.5; // טקסט מעט קטן יותר בברירת מחדל בנייד
        let currentChapter = 1;
        let isDualMode = false;
        let isChumashMode = true;
        let isAutoScroll = false; // מתחיל כגלילה ידנית
        let currentSpeedIdx = 0;
        const playSpeeds = [1, 1.25, 1.5, 1.75, 2, 0.8];
        const audio = document.getElementById('megillahAudio');

        const svgPlay = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>';
        const svgPause = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg>';

        // יצירת כפתורי הפרקים
        function setupNav() {
            const nav = document.getElementById('chapterNav');
            const letters = ["", "א'", "ב'", "ג'", "ד'", "ה'", "ו'", "ז'", "ח'", "ט'", "י'"];
            nav.innerHTML = '';
            for(let i=1; i<=10; i++) {
                const btn = document.createElement('button');
                btn.className = `chapter-btn ${i===1?'active':''}`;
                btn.innerHTML = `פרק ${letters[i]}`;
                btn.onclick = () => loadChapter(i);
                nav.appendChild(btn);
            }
        }

        // ניקוי ניקוד וטעמים
        function stripNikkud(t) {
            return t.replace(/[\u0591-\u05C7]/g, '').replace(/[־\-()]/g, ' ').replace(/[ספ:]/g, '').trim();
        }

        // טעינת פרק
        function loadChapter(num) {
            currentChapter = num;
            document.querySelectorAll('.chapter-btn').forEach((b, i) => b.classList.toggle('active', i+1 === num));
            renderText();
            audio.src = `./audio/chap${num}.mp3`;
            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        // רינדור הטקסט למסך
        function renderText() {
            const area = document.getElementById('textContentArea');
            if(!area) return;
            area.innerHTML = '';
            area.style.fontSize = currentFontSize + 'rem';
            
            const data = (typeof megillahData !== 'undefined') ? megillahData[currentChapter] : [];
            if(!data) return;

            data.forEach((item, idx) => {
                const span = document.createElement('span');
                span.className = 'pasuk';
                span.dataset.index = idx;
                span.onclick = () => { audio.currentTime = item.time; audio.play(); };

                let text = item.t;
                let verseMatch = text.match(/^(\([\u05D0-\u05EA]{1,3}\))/);
                let verseHtml = verseMatch ? `<span class="verse-num">${verseMatch[1]}</span>` : '';
                let cleanText = verseMatch ? text.replace(verseMatch[1], '') : text;

                span.innerHTML = `
                    <span class="text-with">${verseHtml}${cleanText}</span>
                    <span class="text-without">${stripNikkud(cleanText)}</span>
                `;
                area.appendChild(span);
            });
        }

        // החלפת מצב ניקוד
        function toggleMode() {
            isChumashMode = !isChumashMode;
            isDualMode = false;
            applyLayout();
        }

        // החלפת מצב עמודות (מבט כפול)
        function toggleDualMode() {
            isDualMode = !isDualMode;
            applyLayout();
        }

        function applyLayout() {
            const wrapper = document.getElementById('mainWrapper');
            const modeBtn = document.getElementById('modeToggleBtn');
            const dualBtn = document.getElementById('dualViewBtn');

            if (isDualMode) {
                const contentHtml = document.getElementById('textContentArea').innerHTML;
                wrapper.innerHTML = `
                    <div class="dual-view-container">
                        <div class="column mode-chumash">
                            <div class="text-content" style="font-size:${currentFontSize}rem">${contentHtml}</div>
                        </div>
                        <div class="column mode-megillah">
                            <div class="text-content" style="font-size:${currentFontSize}rem">${contentHtml}</div>
                        </div>
                    </div>`;
                modeBtn.style.display = 'none';
                dualBtn.innerText = "תצוגה רגילה";
                attachPasukEvents();
            } else {
                wrapper.innerHTML = `
                    <div id="dualContainer" class="column ${isChumashMode ? 'mode-chumash' : 'mode-megillah'}">
                        <div class="text-content" id="textContentArea" style="font-size:${currentFontSize}rem"></div>
                    </div>`;
                modeBtn.style.display = 'block';
                modeBtn.innerText = isChumashMode ? "ללא ניקוד וטעמים" : "עם ניקוד וטעמים";
                dualBtn.innerText = "צפייה בשתי עמודות";
                renderText();
            }
        }

        function attachPasukEvents() {
            document.querySelectorAll('.pasuk').forEach(p => {
                p.onclick = () => {
                    const idx = p.dataset.index;
                    const time = megillahData[currentChapter][idx].time;
                    audio.currentTime = time;
                    audio.play();
                };
            });
        }

        // גלילה אוטומטית
        function toggleAutoScroll() {
            isAutoScroll = !isAutoScroll;
            const btn = document.getElementById('scrollToggleBtn');
            btn.innerText = isAutoScroll ? "גלילה אוטומטית" : "גלילה ידנית";
            btn.style.background = isAutoScroll ? "var(--accent-color)" : "rgba(255,255,255,0.1)";
            btn.style.color = isAutoScroll ? "var(--primary-color)" : "white";
        }

        // התראה אם מנסים לגלול במצב אוטומטי
        const showToast = () => {
            if(!isAutoScroll) return;
            const t = document.getElementById('scrollToast');
            t.style.display = 'block';
            clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => t.style.display = 'none', 3000);
        };

        window.addEventListener('wheel', showToast);
        window.addEventListener('touchstart', showToast);

        // סנכרון טקסט עם השמע
        function syncText() {
            const data = megillahData[currentChapter] || [];
            let activeIdx = -1;
            for (let i = 0; i < data.length; i++) {
                if (audio.currentTime >= data[i].time) activeIdx = i;
            }
            
            document.querySelectorAll('.pasuk').forEach(p => p.classList.remove('playing-now'));
            const activeSpans = document.querySelectorAll(`.pasuk[data-index="${activeIdx}"]`);
            
            if(activeSpans.length > 0) {
                activeSpans.forEach(s => s.classList.add('playing-now'));
                if(isAutoScroll) {
                    const offset = activeSpans[0].getBoundingClientRect().top + window.scrollY - 150;
                    window.scrollTo({ top: offset, behavior: 'smooth' });
                }
            }
        }

        // שינוי גודל טקסט עם תיקון באג הנייד
        function changeFontSize(d) {
            currentFontSize += d * 0.15;
            if(currentFontSize < 1.2) currentFontSize = 1.2;
            if(currentFontSize > 5) currentFontSize = 5;
            document.querySelectorAll('.text-content').forEach(el => el.style.fontSize = currentFontSize + 'rem');
        }

        function togglePlayPause() {
            if (audio.paused) audio.play();
            else audio.pause();
        }

        audio.onplay = () => document.getElementById('playBtnIcon').innerHTML = svgPause;
        audio.onpause = () => document.getElementById('playBtnIcon').innerHTML = svgPlay;

        function toggleSpeed() {
            currentSpeedIdx = (currentSpeedIdx + 1) % playSpeeds.length;
            audio.playbackRate = playSpeeds[currentSpeedIdx];
            document.getElementById('speedBtn').innerText = '⏱ ' + playSpeeds[currentSpeedIdx] + 'x';
        }

        window.onload = () => {
            setupNav();
            loadChapter(1);
        };
    </script>
</body>
</html>
