<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קול קורא המגילה - דף הבית</title>
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        /* הגדרת האנימציות */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* החלת האנימציות על האלמנטים */
        #welcomeOverlay {
            animation: fadeIn 1s ease-out;
        }

        #welcomeOverlay h1 {
            animation: slideDown 0.8s ease-out backwards;
        }

        #welcomeOverlay p {
            animation: slideDown 0.8s ease-out 0.3s backwards;
        }

        #welcomeOverlay .welcome-btn {
            animation: slideUp 0.8s ease-out 0.6s backwards;
            transition: transform 0.2s, box-shadow 0.2s; /* שומר על אנימציית מעבר חלקה במעבר עכבר */
        }

        /* השהיות מדורגות לכל כפתור כדי שיעלו אחד אחרי השני */
        #welcomeOverlay .welcome-btn:nth-child(2) {
            animation: slideUp 0.8s ease-out 0.75s backwards;
        }

        #welcomeOverlay .welcome-btn:nth-child(3) {
            animation: slideUp 0.8s ease-out 0.9s backwards;
            background: rgba(255, 215, 0, 0.1);
            color: #FFD700;
            border: 1px solid #FFD700;
        }
        
        #welcomeOverlay .welcome-btn:nth-child(3):hover {
            background: rgba(255, 215, 0, 0.2);
        }
        
        /* אפקט הוספה בעת מעבר עכבר על הכפתורים */
        #welcomeOverlay .welcome-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body style="padding-bottom: 0;">

<div id="welcomeOverlay">
    <h1>קול קורא המגילה</h1>
    <p>הכנה למבצעים • מנהגי חב"ד • הברה ספרדית מדויקת</p>
    <div class="welcome-btns">
        <button class="welcome-btn" onclick="window.location.href='reader.html'">הכנת המגילה לבעלי קריאה</button>
        <button class="welcome-btn secondary" onclick="window.location.href='listener.html'">מגילת אסתר למעקב בקריאה בציבור</button>
        <button class="welcome-btn" onclick="window.location.href='halachot.html'">הלכות המגילה ועוזר אישי AI</button>
    </div>
</div>

<script src="firebase-setup.js"></script>
<script>
    // תיעוד כניסה לאתר רק בעמוד הבית - מכשירים ייחודיים בלבד
    window.onload = () => {
        // בודק אם המכשיר הזה כבר ביקר באתר בעבר
        if (!localStorage.getItem('megilla_visited_device')) {
            // אם המכשיר חדש - שומרים לו זיכרון בדפדפן כדי שלא ייספר שוב
            localStorage.setItem('megilla_visited_device', 'true');
            
            // מעדכן את המספר ב-Firebase (מוסיף 1 למונה המכשירים הייחודיים)
            db.ref('stats/uniqueVisitors').set(firebase.database.ServerValue.increment(1));
        }
    };
</script>
</body>
</html>
