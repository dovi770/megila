<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קול המגילה - הכנה למבצעים</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fdfbf7;
            --primary-color: #0b1c2c;
            --accent-color: #d4af37;
            --text-color: #1a1a1a;
            --playing-bg: rgba(11, 28, 44, 0.08);
            --bottom-bar-height: 110px;
        }

        @font-face {
            font-family: 'Guttman Stam';
            src: url('./fonts/guttman-stam.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: var(--bottom-bar-height);
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px 40px;
            border-bottom: 4px solid var(--accent-color);
            display: flex; justify-content: space-between; align-items: center;
            position: relative;
        }

        header h1 { margin: 0; font-family: 'Frank Ruhl Libre', serif; font-size: 2.5rem; flex: 1; text-align: right; }
        header h2 { margin: 0; color: var(--accent-color); font-size: 1rem; flex: 1; text-align: left; font-weight: 400; }

        /* תיקון תפריט פרקים בטלפון */
        .top-nav-bar {
            background-color: #fff;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow-x: auto;
            display: flex;
            justify-content: flex-start; /* מבטיח שפרק א' לא ייעלם */
            padding: 10px;
        }

        .chapter-nav { display: flex; gap: 8px; padding-right: 10px; }

        .chapter-btn {
            background-color: #f8f8f8; color: var(--primary-color);
            border: 1px solid #ddd; padding: 8px 15px;
            border-radius: 8px; cursor: pointer;
            font-weight: 600; white-space: nowrap;
        }

        .chapter-btn.active { background-color: var(--accent-color); border-color: var(--accent-color); }

        .instructions-hint {
            text-align: center; font-size: 0.9rem; color: #666;
            margin-top: 15px; font-weight: bold;
        }

        /* מצב עמודות */
        .tikkun-wrapper { 
            max-width: 1000px; margin: 20px auto; padding: 0 20px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .dual-view-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .column { 
            background: white; padding: 30px; border-radius: 12px; 
            border-bottom: 5px solid var(--accent-color); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
        }

        .text-content { font-family: 'Guttman Stam', serif; line-height: 2; text-align: justify; }
        
        .verse-num { color: #999; font-size: 0.55em; margin-left: 8px; font-family: 'Heebo', sans-serif; }
        .pasuk { border-radius: 6px; padding: 0 4px; cursor: pointer; transition: 0.2s; }
        .pasuk.playing-now { background-color: var(--playing-bg); border-bottom: 3px solid var(--accent-color); }

        /* הסתרת אלמנטים לפי מצב */
        .mode-chumash .text-without { display: none; }
        .mode-megillah .text-with, .mode-megillah .verse-num { display: none; }
        
        /* כפתור צף */
        .floating-controls {
            position: fixed; bottom: calc(var(--bottom-bar-height) + 20px);
            left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1001;
        }

        .f-btn {
            background: var(--accent-color); color: var(--primary-color);
            border: none; padding: 12px 18px; border-radius: 50px;
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer;
        }

        /* נגן תחתון */
        .bottom-player-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background-color: var(--primary-color); height: var(--bottom-bar-height);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
        }

        .player-content { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 800px; padding: 0 20px; }
        
        .main-play-btn {
            background: var(--accent-color); border: none; width: 60px; height: 60px;
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .main-play-btn svg { width: 30px; height: 30px; fill: var(--primary-color); }

        .mini-btn {
            background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 0.85rem;
        }

        /* התראת גלילה */
        #scrollToast {
            position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
            border-radius: 20px; font-size: 0.8rem; display: none; z-index: 2001;
        }

        @media (max-width: 768px) {
            header { flex-direction: column; padding: 15px; }
            header h1 { font-size: 1.8rem; text-align: center; }
            header h2 { text-align: center; font-size: 0.9rem; }
            .dual-view-container { grid-template-columns: 1fr; } /* בטלפון תמיד עמודה אחת אלא אם נגדיר אחרת */
            .dual-mode-btn { display: none; } /* הסתרת כפתור מבט כפול בטלפון במצב אנכי */
        }

        @media (min-width: 769px) {
            .dual-mode-btn { display: block; }
        }
        
        /* עיצוב למצב לרוחב בטלפון */
        @media (max-height: 500px) and (orientation: landscape) {
            .dual-view-container { grid-template-columns: 1fr 1fr; }
            .dual-mode-btn { display: block; }
        }
    </style>
</head>
<body>

    <header>
        <h1>קול המגילה</h1>
        <h2>הברה ספרדית מדויקת ע"פ מנהגי חב"ד<br>מפי הבעל קורא הרב מנחם מענדל רוזנברג שי'</h2>
    </header>

    <nav class="top-nav-bar" id="navContainer">
        <div class="chapter-nav" id="chapterNav"></div>
    </nav>

    <div class="instructions-hint">לחצו על פסוק כדי לדלג לשמיעה</div>

    <div class="floating-controls">
        <button class="f-btn dual-mode-btn" onclick="toggleDualMode()">מבט כפול (חומש/מגילה)</button>
        <button class="f-btn" id="modeToggleBtn" onclick="toggleMode()">ללא ניקוד וטעמים</button>
    </div>

    <main class="tikkun-wrapper" id="mainWrapper">
        <div id="dualContainer" class="column mode-chumash">
            <div class="text-content" id="textContentArea"></div>
        </div>
    </main>

    <div id="scrollToast">לא ניתן לגלול במצב גלילה אוטומטית. בטל כדי לגלול חופשי.</div>

    <audio id="megillahAudio" ontimeupdate="syncText()"></audio>

    <div class="bottom-player-bar">
        <div class="player-content">
            <div style="display:flex; gap:8px;">
                <button class="mini-btn" id="speedBtn" onclick="toggleSpeed()">⏱ 1x</button>
                <button class="mini-btn" id="scrollToggleBtn" onclick="toggleAutoScroll()">גלילה ידנית</button>
            </div>

            <button class="main-play-btn" onclick="togglePlayPause()">
                <div id="playBtnIcon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg></div>
            </button>

            <div style="display:flex; gap:8px;">
                <button class="mini-btn" onclick="changeFontSize(1)">A+</button>
                <button class="mini-btn" onclick="changeFontSize(-1)">A-</button>
            </div>
        </div>
    </div>

    <!-- כאן יבוא הקישור לקובץ הנתונים החיצוני במציאות -->
    <!-- <script src="megillahData.js"></script> -->

    <script>
        // בגלל שזה קובץ אחד כרגע, שמתי פה דגימה של הנתונים. 
        // כשתפריד לקובץ חיצוני, תמחק את המשתנה megillahData מכאן.
        const megillahData = {
            1:[
                { t: "(א) וַיְהִ֖י בִּימֵ֣י אֲחַשְׁוֵר֑וֹשׁ ה֣וּא אֲחַשְׁוֵר֗וֹשׁ הַמֹּלֵךְ֙ מֵהֹ֣דּוּ וְעַד־כּ֔וּשׁ שֶׁ֛בַע וְעֶשְׂרִ֥ים וּמֵאָ֖ה מְדִינָֽה:", time: 0 },
                { t: "(ב) בַּיָּמִ֖ים הָהֵ֑ם כְּשֶׁ֣בֶת׀ הַמֶּ֣לֶךְ אֲחַשְׁוֵר֗וֹשׁ עַ֚ל כִּסֵּ֣א מַלְכוּת֔וֹ אֲשֶׁ֖ר בְּשׁוּשַׁ֥ן הַבִּירָֽה:", time: 11 },
                { t: "(ג) בִּשְׁנַ֤ת שָׁלוֹשׁ֙ לְמָלְכ֔וֹ עָשָׂ֣ה מִשְׁתֶּ֔ה לְכָל־שָׂרָ֖יו וַעֲבָדָ֑יו חֵ֣יל׀ פָּרַ֣ס וּמָדַ֗י הַֽפַּרְתְּמִ֛ים וְשָׂרֵ֥י הַמְּדִינ֖וֹת לְפָנָֽיו:", time: 19 },
                { t: "(ד) בְּהַרְאֹת֗וֹ אֶת־עֹ֙שֶׁר֙ כְּב֣וֹד מַלְכוּת֔וֹ וְאֶ֨ת־יְקָ֔ר תִּפְאֶ֖רֶת גְּדוּלָּת֑וֹ יָמִ֣ים רַבִּ֔ים שְׁמוֹנִ֥ים וּמְאַ֖ת יֽוֹם:", time: 30 },
                { t: "(ה) וּבִמְל֣וֹאת׀ הַיָּמִ֣ים הָאֵ֗לֶּה עָשָׂ֣ה הַמֶּ֡לֶךְ לְכָל־הָעָ֣ם הַנִּמְצְאִים֩ בְּשׁוּשַׁ֨ן הַבִּירָ֜ה לְמִגָּ֧דוֹל וְעַד־ קָטָ֛ן מִשְׁתֶּ֖ה שִׁבְעַת֙ יָמִ֑ים בַּחֲצַ֕ר גִּנַּ֥ת בִּיתַ֖ן הַמֶּֽלֶךְ:", time: 40 }
                // המשך הנתונים...
            ],
            2:[ { t: "(א) אַחַר֙ הַדְּבָרִ֣ים הָאֵ֔לֶּה...", time: 0 } ]
            // שאר הפרקים...
        };

        let currentFontSize = window.innerWidth < 768 ? 1.8 : 2.4; // גודל התחלתי קטן יותר לנייד
        let currentChapter = 1;
        let isDualMode = false;
        let isChumashMode = true;
        let isAutoScroll = false; // ברירת מחדל ידני
        let currentSpeedIdx = 0;
        const playSpeeds = [1, 1.25, 1.5, 1.75, 2, 0.8];
        const audio = document.getElementById('megillahAudio');

        function setupNav() {
            const nav = document.getElementById('chapterNav');
            const letters = ["", "א'", "ב'", "ג'", "ד'", "ה'", "ו'", "ז'", "ח'", "ט'", "י'"];
            nav.innerHTML = '';
            for(let i=1; i<=10; i++) {
                const btn = document.createElement('button');
                btn.className = `chapter-btn ${i===1?'active':''}`;
                btn.innerHTML = `פרק ${letters[i]}`;
                btn.onclick = () => loadChapter(i);
                nav.appendChild(btn);
            }
        }

        function stripNikkud(t) {
            return t.replace(/[\u0591-\u05C7]/g, '').replace(/[־\-()]/g, ' ').replace(/[ספ:]/g, '').trim();
        }

        function loadChapter(num) {
            currentChapter = num;
            document.querySelectorAll('.chapter-btn').forEach((b, i) => b.classList.toggle('active', i+1 === num));
            renderText();
            audio.src = `./audio/chap${num}.mp3`;
            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        function renderText() {
            const area = document.getElementById('textContentArea');
            area.innerHTML = '';
            area.style.fontSize = currentFontSize + 'rem';
            
            const data = megillahData[currentChapter] || [];
            data.forEach((item, idx) => {
                const span = document.createElement('span');
                span.className = 'pasuk';
                span.dataset.index = idx;
                span.onclick = () => { audio.currentTime = item.time; audio.play(); };

                let text = item.t;
                let verseMatch = text.match(/^(\([\u05D0-\u05EA]{1,3}\))/);
                let verseHtml = verseMatch ? `<span class="verse-num">${verseMatch[1]}</span>` : '';
                let cleanText = verseMatch ? text.replace(verseMatch[1], '') : text;

                span.innerHTML = `
                    <span class="text-with">${verseHtml}${cleanText}</span>
                    <span class="text-without">${stripNikkud(cleanText)}</span>
                `;
                area.appendChild(span);
            });
        }

        function toggleMode() {
            isChumashMode = !isChumashMode;
            isDualMode = false;
            applyLayout();
        }

        function toggleDualMode() {
            isDualMode = !isDualMode;
            applyLayout();
        }

        function applyLayout() {
            const container = document.getElementById('dualContainer');
            const wrapper = document.getElementById('mainWrapper');
            const btn = document.getElementById('modeToggleBtn');

            if (isDualMode) {
                wrapper.innerHTML = `
                    <div class="dual-view-container">
                        <div class="column mode-chumash">
                            <div class="text-content" style="font-size:${currentFontSize}rem">${document.getElementById('textContentArea').innerHTML}</div>
                        </div>
                        <div class="column mode-megillah">
                            <div class="text-content" style="font-size:${currentFontSize}rem">${document.getElementById('textContentArea').innerHTML}</div>
                        </div>
                    </div>`;
                btn.innerText = "חזור לתצוגה רגילה";
                attachPasukEvents();
            } else {
                wrapper.innerHTML = `
                    <div id="dualContainer" class="column ${isChumashMode ? 'mode-chumash' : 'mode-megillah'}">
                        <div class="text-content" id="textContentArea" style="font-size:${currentFontSize}rem"></div>
                    </div>`;
                renderText();
                btn.innerText = isChumashMode ? "ללא ניקוד וטעמים" : "עם ניקוד וטעמים";
            }
        }

        function attachPasukEvents() {
            document.querySelectorAll('.pasuk').forEach(p => {
                p.onclick = () => {
                    const idx = p.dataset.index;
                    const time = megillahData[currentChapter][idx].time;
                    audio.currentTime = time;
                    audio.play();
                };
            });
        }

        function toggleAutoScroll() {
            isAutoScroll = !isAutoScroll;
            const btn = document.getElementById('scrollToggleBtn');
            btn.innerText = isAutoScroll ? "גלילה אוטומטית" : "גלילה ידנית";
            btn.style.background = isAutoScroll ? "var(--accent-color)" : "rgba(255,255,255,0.1)";
            btn.style.color = isAutoScroll ? "var(--primary-color)" : "white";
        }

        // זיהוי ניסיון גלילה ידנית במצב אוטומטי
        window.addEventListener('wheel', (e) => { if(isAutoScroll) showScrollToast(); });
        window.addEventListener('touchstart', (e) => { if(isAutoScroll) showScrollToast(); });

        function showScrollToast() {
            const t = document.getElementById('scrollToast');
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        function syncText() {
            const pesukim = megillahData[currentChapter] || [];
            let activeIdx = -1;
            pesukim.forEach((p, i) => { if(audio.currentTime >= p.time) activeIdx = i; });
            
            document.querySelectorAll('.pasuk').forEach(p => p.classList.remove('playing-now'));
            const activeSpans = document.querySelectorAll(`.pasuk[data-index="${activeIdx}"]`);
            
            if(activeSpans.length > 0) {
                activeSpans.forEach(s => s.classList.add('playing-now'));
                if(isAutoScroll) {
                    // גלילה כך שהפסוק יהיה יחסית למעלה (150 פיקסלים מהקצה)
                    window.scrollTo({ top: activeSpans[0].offsetTop - 150, behavior: 'smooth' });
                }
            }
        }

        function changeFontSize(d) {
            currentFontSize += d * 0.1; // שינוי עדין יותר למניעת באגים
            if(currentFontSize < 1) currentFontSize = 1;
            document.querySelectorAll('.text-content').forEach(el => el.style.fontSize = currentFontSize + 'rem');
        }

        function togglePlayPause() {
            if (audio.paused) audio.play();
            else audio.pause();
        }

        audio.onplay = () => document.getElementById('playBtnIcon').innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg>';
        audio.onpause = () => document.getElementById('playBtnIcon').innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>';

        function toggleSpeed() {
            currentSpeedIdx = (currentSpeedIdx + 1) % playSpeeds.length;
            audio.playbackRate = playSpeeds[currentSpeedIdx];
            document.getElementById('speedBtn').innerText = '⏱ ' + playSpeeds[currentSpeedIdx] + 'x';
        }

        window.onload = () => {
            setupNav();
            loadChapter(1);
        };
    </script>
</body>
</html>
