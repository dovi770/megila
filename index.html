<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קול קורא המגילה</title>
    
    <!-- פונטים חיצוניים -->
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- קישור לקובץ העיצוב -->
    <link rel="stylesheet" href="style.css">

    <!-- ספריות Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="welcomeOverlay">
        <h1>קול קורא המגילה</h1>
        <p>הכנה למבצעים • מנהגי חב"ד • הברה ספרדית מדויקת</p>
        <div class="welcome-btns">
            <button class="welcome-btn" onclick="startApp('reader')">הכנת המגילה לבעלי קריאה</button>
            <button class="welcome-btn secondary" onclick="startApp('listener')">מגילת אסתר למעקב בקריאה בציבור</button>
        </div>
    </div>

    <header>
        <div class="header-text">
            <h1 onclick="showWelcomeScreen()">קול קורא המגילה</h1>
            <h2>הברה ספרדית מדויקת ע"פ מנהגי חב"ד<br>מפי הבעל קורא הרב מנחם מענדל רוזנברג שי'</h2>
        </div>
        <div class="header-actions">
            <button class="mini-btn" onclick="openContactModal()">✉️ צור קשר</button>
            <button class="mini-btn" onclick="openAdminLogin()" title="ניהול">⚙️</button>
        </div>
    </header>

    <nav class="top-nav-bar">
        <div class="chapter-nav" id="chapterNav"></div>
    </nav>

    <div class="instructions-hint" id="instructionsHint">לשמיעה – לחצו על הפסוק הרצוי</div>

    <div class="tikkun-wrapper">
        <main id="mainWrapper">
            <div id="dualContainer" class="column mode-chumash">
                <div class="text-content" id="textContentArea"></div>
            </div>
        </main>
        <div class="bottom-nav-btns" id="bottomNav"></div>
    </div>

    <div class="floating-controls" id="floatingControls">
        <button class="f-btn" id="mainCycleBtn" onclick="cycleDisplayMode()">לתצוגה ללא ניקוד וטעמים</button>
    </div>

    <audio id="megillahAudio" ontimeupdate="syncText()"></audio>

    <!-- סרגלי כלים תחתונים -->
    <div class="bottom-player-bar" id="playerBar">
        <div class="player-content">
            <div style="display:flex; gap:8px; flex:1;">
                <button class="mini-btn" id="speedBtn" onclick="toggleSpeed()">⏱ 1x</button>
                <button class="mini-btn" id="scrollCycleBtn" onclick="cycleScrollMode()">לגלילה אוטומטית</button>
            </div>
            <button class="main-play-btn" onclick="togglePlayPause()">
                <div id="playBtnIcon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg></div>
            </button>
            <div style="display:flex; gap:8px; flex:1; justify-content: flex-end;">
                <button class="mini-btn" onclick="changeFontSize(1)">A+</button>
                <button class="mini-btn" onclick="changeFontSize(-1)">A-</button>
            </div>
        </div>
    </div>

    <div class="bottom-player-bar hidden" id="listenerBar">
        <div class="player-content">
            <div style="display:flex; gap:8px; flex:1;">
                <button class="mini-btn" id="listenerScrollToggleBtn" onclick="toggleListenerScroll()">▶ גלילה אוטומטית</button>
                <button class="mini-btn" id="listenerSpeedBtn" onclick="changeListenerScrollSpeed()">💨 מהירות: 1</button>
            </div>
            <div style="display:flex; gap:8px; flex:1; justify-content: flex-end;">
                <button class="mini-btn" onclick="changeFontSize(1)">A+</button>
                <button class="mini-btn" onclick="changeFontSize(-1)">A-</button>
            </div>
        </div>
    </div>

    <!-- מודלים (צור קשר וניהול) -->
    <div id="contactModal" class="modal-overlay">
        <div class="modal-box">
            <button class="close-modal" onclick="closeModals()">✖</button>
            <h3>צור קשר עם ההנהלה</h3>
            <div class="form-group"><label>שם:</label><input type="text" id="contactName"></div>
            <div class="form-group"><label>הודעה:</label><textarea id="contactMessage" rows="4"></textarea></div>
            <button class="submit-btn" onclick="sendMessage()">שלח הודעה</button>
        </div>
    </div>

    <div id="adminModal" class="modal-overlay">
        <div class="modal-box">
            <button class="close-modal" onclick="closeModals()">✖</button>
            <h3>פאנל ניהול</h3>
            <div class="admin-stats">
                <p>👁️ כניסות: <span id="adminVisits">...</span></p>
                <p>🎧 השמעות: <span id="adminPlays">...</span></p>
                <button class="mini-btn" onclick="clearAdminData()" style="background: darkred;">מחק נתונים</button>
            </div>
            <h4>הודעות:</h4>
            <ul class="data-list" id="adminMessagesList"></ul>
            <h4>היסטוריה:</h4>
            <ul class="data-list" id="adminPlaysList"></ul>
        </div>
    </div>

    <!-- טעינת הנתונים והסקריפטים -->
    <script src="megillahData.js"></script>
    <script src="megillahDataNoNikkud.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
