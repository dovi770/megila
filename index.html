<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קול קורא המגילה - דף הבית</title>
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body style="padding-bottom: 0;">

<div id="welcomeOverlay">
    <h1>קול קורא המגילה</h1>
    <p>הכנה למבצעים • מנהגי חב"ד • הברה ספרדית מדויקת</p>
    <div class="welcome-btns">
        <button class="welcome-btn" onclick="window.location.href='reader.html'">הכנת המגילה לבעלי קריאה</button>
        <button class="welcome-btn secondary" onclick="window.location.href='listener.html'">מגילת אסתר למעקב בקריאה בציבור</button>
    </div>
</div>

<script src="firebase-setup.js"></script>
<script>
    // תיעוד כניסה לאתר רק בעמוד הבית - מכשירים ייחודיים בלבד
    window.onload = () => {
        // בודק אם המכשיר הזה כבר ביקר באתר בעבר
        if (!localStorage.getItem('megilla_visited_device')) {
            // אם המכשיר חדש - שומרים לו זיכרון בדפדפן כדי שלא ייספר שוב
            localStorage.setItem('megilla_visited_device', 'true');
            
            // מעדכן את המספר ב-Firebase (מוסיף 1 למונה המכשירים הייחודיים)
            db.ref('stats/uniqueVisitors').set(firebase.database.ServerValue.increment(1));
        }
    };
</script>
</body>
</html>
